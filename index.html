<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI-Driven Issue Tracker — A modern, intelligent kanban board for managing project issues with Gemini AI integration.">
  <meta name="theme-color" content="#0f172a">
  <title>AI-Driven Issue Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  
  <header class="app-header">
    <div class="header-container">
      <h1>Issue Tracker</h1>
      <div class="header-actions">
        <button id="theme-toggle-btn" class="icon-btn" title="Toggle Theme">
          <svg class="sun-icon hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
          <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        </button>
        <button id="add-issue-btn" class="btn primary-btn">+ New Issue</button>
        <img id="profile-btn" src="https://ui-avatars.com/api/?name=Guest+User&background=6366f1&color=fff" alt="Profile" class="profile-avatar" title="Profile Settings">
      </div>
    </div>
  </header>

  <div class="app-layout" id="app-layout">
    <button id="sidebar-toggle" class="sidebar-toggle-btn" title="Toggle Sidebar">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="toggle-icon"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <nav class="side-nav">
      <div class="nav-links">
        <button id="nav-home-btn" class="nav-item" title="Home">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span class="nav-label">Home</span>
        </button>
        <button id="nav-settings-btn" class="nav-item" title="Settings">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
          <span class="nav-label">Settings</span>
        </button>
      </div>
    </nav>
    
    <main class="board-container">
    
    <!-- To Do Column -->
    <div class="column" data-status="todo">
      <div class="column-header">
        <h2>To Do</h2>
        <span class="issue-count" id="count-todo">0</span>
      </div>
      <div class="column-body" id="list-todo">
        <!-- Issues will be injected here by JS -->
      </div>
    </div>

    <!-- In Progress Column -->
    <div class="column" data-status="in-progress">
      <div class="column-header">
        <h2>In Progress</h2>
        <span class="issue-count" id="count-in-progress">0</span>
      </div>
      <div class="column-body" id="list-in-progress">
        <!-- Issues will be injected here by JS -->
      </div>
    </div>

    <!-- Completed Column -->
    <div class="column" data-status="completed">
      <div class="column-header">
        <h2>Completed</h2>
        <span class="issue-count" id="count-completed">0</span>
      </div>
      <div class="column-body" id="list-completed">
        <!-- Issues will be injected here by JS -->
      </div>
    </div>

    </main>
  </div>

  <!-- Modal for Adding Issues -->
  <div id="issue-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <header class="modal-header">
        <h2>Create New Issue</h2>
        <button id="close-modal-btn" class="icon-btn">&times;</button>
      </header>
      <form id="issue-form">
        <div class="form-group">
          <label for="issue-title">Title</label>
          <input type="text" id="issue-title" name="title" required placeholder="e.g. Implement user authentication" autocomplete="off">
        </div>
        <div class="form-group">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
            <label for="issue-desc" style="margin: 0;">Description</label>
            <button type="button" id="ai-generate-btn" class="btn secondary-btn" style="padding: 0.2rem 0.5rem; font-size: 0.75rem; border-color: #c084fc; color: #c084fc;">✨ Auto-Generate</button>
          </div>
          <textarea id="issue-desc" name="description" rows="4" placeholder="Add detailed context..." required></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" id="cancel-issue-btn" class="btn secondary-btn">Cancel</button>
          <button type="submit" class="btn primary-btn">Create Issue</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
